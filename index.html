// ── Events ─────────────────────────────────────────────────
function bindEvents() {
  document.getElementById('btnRandom').addEventListener('click', () => {
    order = shuffleByViewCount([...Array(filtered.length).keys()]);
    cursor = 0;
    showCurrent();
  });

  document.getElementById('btnPrev').addEventListener('click', () => {
    if (cursor > 0) { cursor--; showCurrent(); }
  });

  document.getElementById('btnNext').addEventListener('click', () => {
    if (cursor < filtered.length - 1) { cursor++; showCurrent(); }
  });

  // ── Mark current sub-question as wrong / correct ──
  function markAttempt(kind) {
    if (filtered.length === 0) return;
    const { prob, sq } = filtered[order[cursor]];
    incrementAttemptCount(prob, sq, kind);
    const btn = document.getElementById(kind === 'wrong' ? 'btnMarkWrong' : 'btnMarkCorrect');
    const disp = document.getElementById(kind === 'wrong' ? 'wrongCountDisplay' : 'correctCountDisplay');
    disp.textContent = getAttemptCount(prob, sq, kind);
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 350);
  }
  document.getElementById('btnMarkWrong').addEventListener('click', () => markAttempt('wrong'));
  document.getElementById('btnMarkCorrect').addEventListener('click', () => markAttempt('correct'));

  document.getElementById('btnToggle').addEventListener('click', () => {
    answerRevealed ? hideAnswer() : revealAnswer();
  });

  // ── Stopwatch click → pause / resume ──
  document.getElementById('stopwatch').addEventListener('click', toggleStopwatch);

  // ── Highlight reset for the answer area ──
  document.getElementById('btnHlResetAnswer').addEventListener('click', () => {
    if (filtered.length === 0) return;
    if (currentHighlights.answer.length === 0) return;
    if (!confirm('이 설문의 모범답안에 친 형광펜을 모두 지울까요?')) return;
    const { prob, sq } = filtered[order[cursor]];
    currentHighlights.answer = [];
    saveHighlightsFor('answer', prob, sq);
    rerenderHlArea('answer');
  });

  // ── Copy answer to clipboard ──
  document.getElementById('btnCopyAnswer').addEventListener('click', async () => {
    if (filtered.length === 0) return;
    const { sq } = filtered[order[cursor]];
    const text = sq.answer || '';
    if (!text) return;
    const btn = document.getElementById('btnCopyAnswer');
    const original = btn.textContent;
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = '✅ 복사됨!';
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); btn.textContent = '✅ 복사됨!'; }
      catch { btn.textContent = '⚠ 복사 실패'; }
      document.body.removeChild(ta);
    }
    setTimeout(() => { btn.textContent = original; }, 1200);
  });

  document.getElementById('overlay').addEventListener('click', revealAnswer);

  // Filter buttons are re-rendered each time the subject changes — use delegation
  document.getElementById('filterGroup').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#filterGroup .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.exam);
  });

  // 태그 필터 — 다중 toggle 가능
  document.getElementById('tagGroup').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const tag = btn.dataset.tag;
    if (activeTags.has(tag)) {
      activeTags.delete(tag);
      btn.classList.remove('active');
    } else {
      activeTags.add(tag);
      btn.classList.add('active');
    }
    applyFilter(activeExam);
  });

  // Subject panel: toggle, handle, item selection
  const sToggle = document.getElementById('subjectToggle');
  const sPanel = document.getElementById('subjectPanel');
  const sHandle = document.getElementById('subjectHandle');
  function openSubjectPanel() { sPanel.classList.add('open'); }
  function closeSubjectPanel() { sPanel.classList.remove('open'); }
  sToggle.addEventListener('click', () =>
    sPanel.classList.contains('open') ? closeSubjectPanel() : openSubjectPanel());
  sHandle.addEventListener('click', () =>
    sPanel.classList.contains('open') ? closeSubjectPanel() : openSubjectPanel());
  document.getElementById('subjectList').addEventListener('click', e => {
    const item = e.target.closest('.subject-item');
    if (!item) return;
    const subj = item.dataset.subject;
    if (subj && subj !== activeSubject) setSubject(subj);
    closeSubjectPanel();
  });
  document.addEventListener('mousedown', e => {
    if (!sPanel.classList.contains('open')) return;
    if (e.target.closest('#subjectPanel')) return;
    if (e.target.closest('#subjectToggle')) return;
    if (e.target.closest('#subjectHandle')) return;
    closeSubjectPanel();
  });

  // Persist study notes whenever an input changes
  document.getElementById('studyInputBlock').addEventListener('input', e => {
    if (!e.target.classList.contains('study-input')) return;
    if (filtered.length === 0) return;
    const { prob, sq } = filtered[order[cursor]];
    saveNote(prob, sq, e.target.dataset.cat, e.target.value);
  });

  // Submit button reveals the extracted answer for that single category
  document.getElementById('studyInputBlock').addEventListener('click', e => {
    if (!e.target.classList.contains('study-submit')) return;
    showInlineAnswer(e.target.dataset.cat);
  });

  // Reset all study notes for the current sub-question
  document.getElementById('btnResetNotes').addEventListener('click', () => {
    if (filtered.length === 0) return;
    if (!confirm('이 설문의 학습 노트를 모두 지울까요?')) return;
    const { prob, sq } = filtered[order[cursor]];
    document.querySelectorAll('#studyInputBlock .study-input').forEach(t => {
      localStorage.removeItem(noteKey(prob, sq, t.dataset.cat));
      t.value = '';
    });
    resetInlineAnswers();
  });

  // Keyboard shortcuts (skip when typing in inputs/textareas)
  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') document.getElementById('btnPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
    if (e.key === 'Enter') { e.preventDefault(); answerRevealed ? hideAnswer() : revealAnswer(); }
    if (e.key === ' ') { e.preventDefault(); toggleStopwatch(); }
    if (e.key === 'r' || e.key === 'R') document.getElementById('btnRandom').click();
  });

  // ── Highlight: floating button when text is selected inside a hl-area ──
  const floatBtn = document.getElementById('hlFloatBtn');

  document.addEventListener('mouseup', e => {
    if (e.target.closest('#hlFloatBtn')) return;
    setTimeout(() => {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed || sel.toString().trim() === '') {
        floatBtn.style.display = 'none';
        return;
      }
      const range = sel.getRangeAt(0);
      const areaEl = findHlAreaContainingRange(range);
      if (!areaEl) { floatBtn.style.display = 'none'; return; }

      const startOff = getCharOffsetFromPoint(areaEl, range.startContainer, range.startOffset);
      const endOff = getCharOffsetFromPoint(areaEl, range.endContainer, range.endOffset);
      if (startOff < 0 || endOff < 0 || startOff === endOff) {
        floatBtn.style.display = 'none';
        return;
      }

      const rect = range.getBoundingClientRect();
      const area = areaEl.dataset.hlArea;
      floatBtn.style.left = `${rect.right + 6 + window.scrollX}px`;
      floatBtn.style.top = `${rect.top - 34 + window.scrollY}px`;
      floatBtn.style.display = 'block';
      floatBtn.dataset.area = area;
      floatBtn.dataset.startOff = String(Math.min(startOff, endOff));
      floatBtn.dataset.endOff = String(Math.max(startOff, endOff));
    }, 0);
  });

  // Don't lose the user's selection when they mousedown on the floating button
  floatBtn.addEventListener('mousedown', e => e.preventDefault());

  floatBtn.addEventListener('click', () => {
    if (filtered.length === 0) return;
    const area = floatBtn.dataset.area;
    const start = parseInt(floatBtn.dataset.startOff, 10);
    const end = parseInt(floatBtn.dataset.endOff, 10);
    if (!area || isNaN(start) || isNaN(end)) return;
    addHighlightRange(area, start, end);
    const { prob, sq } = filtered[order[cursor]];
    saveHighlightsFor(area, prob, sq);
    rerenderHlArea(area);
    window.getSelection().removeAllRanges();
    floatBtn.style.display = 'none';
  });

  // ── Statute side panel ──
  document.getElementById('statuteToggle').addEventListener('click', () => {
    const panel = document.getElementById('statutePanel');
    if (panel.classList.contains('open')) closeStatutePanel();
    else openStatutePanel();
  });
  document.getElementById('statuteClose').addEventListener('click', closeStatutePanel);
  // Side handle on the panel's left edge — also collapses/expands
  document.getElementById('statuteHandle').addEventListener('click', () => {
    const panel = document.getElementById('statutePanel');
    if (panel.classList.contains('open')) closeStatutePanel();
    else openStatutePanel();
  });
  document.getElementById('statuteSearch').addEventListener('input', e => {
    renderStatuteList(e.target.value, null);
  });
  document.getElementById('statuteList').addEventListener('click', e => {
    const item = e.target.closest('.statute-item');
    if (!item) return;
    const marker = item.dataset.marker;
    document.querySelectorAll('#statuteList .statute-item').forEach(el => el.classList.toggle('active', el === item));
  });
  // Article reference inside the answer → open panel + reveal
  document.addEventListener('click', e => {
    const link = e.target.closest('.article-link');
    if (!link) return;
    e.preventDefault();
    openStatutePanel(link.dataset.marker);
  });
  // Click outside the panel to close it (handle, toggle, links excluded)
  document.addEventListener('mousedown', e => {
    const panel = document.getElementById('statutePanel');
    if (!panel.classList.contains('open')) return;
    if (e.target.closest('#statutePanel')) return;
    if (e.target.closest('#statuteToggle')) return;
    if (e.target.closest('#statuteHandle')) return;
    if (e.target.closest('.article-link')) return;
    closeStatutePanel();
  });
  // ESC closes the panel
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    const panel = document.getElementById('statutePanel');
    if (panel.classList.contains('open')) {
      e.stopPropagation();
      closeStatutePanel();
    }
  });

  // ── Cloze quiz ──
  document.getElementById('btnQuiz').addEventListener('click', () => {
    if (quizMode) endQuiz();
    else startQuiz();
  });
  document.getElementById('btnQuizCheck').addEventListener('click', checkQuiz);
  document.getElementById('btnQuizEnd').addEventListener('click', endQuiz);

  // Click on a yellow highlight span to remove that range
  document.addEventListener('click', e => {
    const span = e.target.closest('.user-hl');
    if (!span) return;
    const start = parseInt(span.dataset.hlStart, 10);
    const end = parseInt(span.dataset.hlEnd, 10);
    if (isNaN(start) || isNaN(end)) return;
    const areaEl = span.closest('[data-hl-area]');
    if (!areaEl) return;
    const area = areaEl.dataset.hlArea;
    removeHighlightRange(area, start, end);
    if (filtered.length === 0) return;
    const { prob, sq } = filtered[order[cursor]];
    saveHighlightsFor(area, prob, sq);
    rerenderHlArea(area);
  });
}

      <div style="font-size:1rem;color:#666">데이터가 없습니다. 먼저 parse_pdfs.py를 실행하세요.</div>
      <div style="font-size:0.85rem;color:#999;background:#f4f4f4;padding:10px 18px;border-radius:6px;font-family:monospace">
        cd /Users/iseongjae/Desktop/기출 &amp;&amp; python3 parse_pdfs.py
      </div>
    </div>`;
} else {
  init();
}
